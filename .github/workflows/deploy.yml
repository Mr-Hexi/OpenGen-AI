name: Deploy OpenGen AI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "📦 Navigating to project..."
            cd ~/OpenGen-AI

            echo "⬇️ Pulling latest code..."
            git pull origin main

            echo "🐍 Activating virtual environment..."
            source venv/bin/activate

            echo "📚 Installing dependencies..."
            pip install -r requirements.txt

            echo "🛑 Stopping existing OpenGen AI process (if running)..."
            pkill -f "gunicorn opengen_ai" || echo "No existing process found"

            echo "⏳ Waiting for process to fully stop..."
            sleep 2

            echo "🚀 Starting OpenGen AI..."
            nohup gunicorn opengen_ai.wsgi:application \
              --bind 0.0.0.0:8000 \
              --workers 2 \
              > gunicorn.log 2>&1 &

            echo "✅ Deployment complete!"
